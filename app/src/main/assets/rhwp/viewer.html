<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    [hidden] { display:none !important; }
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#111827; color:#f9fafb; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans CJK KR', 'Noto Sans KR', sans-serif; }
    #status { box-sizing:border-box; height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; text-align:center; color:#d1d5db; font-size:15px; line-height:1.5; white-space:pre-line; }
    #viewer { box-sizing:border-box; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; touch-action:pan-y; overflow:hidden; background:#111827; }
    #pageHost { box-sizing:border-box; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; padding:0; overflow:hidden; }
    .page { box-sizing:border-box; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; overflow:hidden; background:#111827; }
    .page svg { display:block; max-width:100vw; max-height:100vh; width:auto; height:auto; background:white; box-shadow:0 0 18px rgba(0,0,0,.38); }
    #badge { position:fixed; right:10px; bottom:8px; z-index:10; padding:5px 8px; border-radius:999px; background:rgba(17,24,39,.58); color:#e5e7eb; font-size:12px; line-height:1; user-select:none; pointer-events:none; }
  </style>
</head>
<body>
  <div id="status">HWP 렌더링 엔진 준비 중…</div>
  <div id="viewer" hidden><div id="pageHost"></div><div id="badge"></div></div>
  <script type="module">
    import init, { initSync, HwpDocument } from './rhwp.js';

    let ready = false;
    let pending = null;
    let ctx = null;
    let lastFont = '';
    let doc = null;
    let total = 0;
    let current = 0;
    let rendered = new Map();
    let touchStartX = 0;
    let touchStartY = 0;
    let startedFromAndroid = false;

    globalThis.measureTextWidth = (font, text) => {
      if (!ctx) ctx = document.createElement('canvas').getContext('2d');
      if (font !== lastFont) { ctx.font = font; lastFont = font; }
      return ctx.measureText(text || '').width;
    };

    const status = document.getElementById('status');
    const viewer = document.getElementById('viewer');
    const pageHost = document.getElementById('pageHost');
    const badge = document.getElementById('badge');

    function bytesFromBase64(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function setStatus(message) {
      viewer.hidden = true;
      status.hidden = false;
      status.textContent = message;
      if (window.AndroidHwpRenderer && AndroidHwpRenderer.onStatus) AndroidHwpRenderer.onStatus(message);
    }

    function setRendered(pageCount) {
      status.hidden = true;
      viewer.hidden = false;
      if (window.AndroidHwpRenderer && AndroidHwpRenderer.onRendered) AndroidHwpRenderer.onRendered(String(pageCount));
    }

    function loadWasmBytes() {
      return new Promise((resolve, reject) => {
        const request = new XMLHttpRequest();
        request.open('GET', 'rhwp_bg.wasm', true);
        request.responseType = 'arraybuffer';
        request.onload = () => {
          if (request.status === 0 || (request.status >= 200 && request.status < 300)) resolve(request.response);
          else reject(new Error('WASM asset load failed: HTTP ' + request.status));
        };
        request.onerror = () => reject(new Error('WASM asset load failed'));
        request.send();
      });
    }

    async function boot() {
      try {
        const wasmBytes = await loadWasmBytes();
        try {
          initSync(wasmBytes);
        } catch (syncError) {
          console.warn('HWP WASM sync init failed; retrying async init', syncError);
          await init(wasmBytes);
        }
        ready = true;
        setStatus('HWP 렌더링 엔진 준비 완료');
        if (pending) {
          const p = pending;
          pending = null;
          await window.renderHwpBase64(p.base64, p.name);
        }
      } catch (error) {
        const detail = error && error.message ? error.message : String(error);
        const legacyHint = /invalid local type|WebAssembly\.compile/i.test(detail)
          ? '\n\n현재 Android System WebView가 이 HWP 렌더링 엔진의 WASM을 지원하지 않습니다. 최신 WebView/Chrome 기반 환경에서 다시 시도해야 합니다.'
          : '';
        const message = 'HWP 렌더링 엔진 초기화 실패\n' + detail + legacyHint;
        setStatus(message);
        if (window.AndroidHwpRenderer && AndroidHwpRenderer.onFailed) AndroidHwpRenderer.onFailed(message);
      }
    }

    function renderPage(index) {
      if (!doc) throw new Error('HWP document is not loaded');
      if (index < 0 || index >= total) return false;
      current = index;
      let svg = rendered.get(index);
      if (!svg) {
        svg = doc.renderPageSvg(index);
        if (!svg || !String(svg).trim()) throw new Error('HWP engine returned an empty page ' + (index + 1));
        rendered.set(index, svg);
      }
      pageHost.innerHTML = '';
      const page = document.createElement('div');
      page.className = 'page';
      page.innerHTML = svg;
      pageHost.appendChild(page);
      badge.textContent = `${current + 1} / ${total}`;
      if (window.AndroidHwpRenderer && AndroidHwpRenderer.onPageChanged) AndroidHwpRenderer.onPageChanged(String(current + 1), String(total));
      return true;
    }

    function nextPage(delta) {
      const target = Math.max(0, Math.min(total - 1, current + delta));
      if (target !== current) renderPage(target);
    }

    window.previousHwpPage = () => nextPage(-1);
    window.nextHwpPage = () => nextPage(1);

    viewer.addEventListener('touchstart', (event) => {
      const t = event.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });

    viewer.addEventListener('touchend', (event) => {
      const t = event.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.abs(dx) > 56 && Math.abs(dx) > Math.abs(dy) * 1.25) nextPage(dx < 0 ? 1 : -1);
    }, { passive: true });

    window.renderHwpBase64 = async (base64, name) => {
      if (!ready) {
        pending = { base64, name };
        setStatus('HWP 렌더링 엔진 로딩 중…');
        return;
      }
      try {
        setStatus((name || '문서') + '\n렌더링 중…');
        pageHost.innerHTML = '';
        rendered.clear();
        doc = new HwpDocument(bytesFromBase64(base64));
        total = Number(doc.pageCount ? doc.pageCount() : 0);
        if (!total) throw new Error('HWP 문서 페이지를 읽지 못했습니다');
        renderPage(0);
        setRendered(total);
      } catch (error) {
        const message = 'HWP 렌더링 실패\n' + (error && error.stack ? error.stack : String(error));
        setStatus(message);
        if (window.AndroidHwpRenderer && AndroidHwpRenderer.onFailed) AndroidHwpRenderer.onFailed(message);
      }
    };

    window.startHwpFromAndroid = async () => {
      if (startedFromAndroid) return;
      if (!window.AndroidHwpRenderer || !AndroidHwpRenderer.documentBase64) {
        const message = 'HWP 렌더링 실패\nAndroid document bridge is not available';
        setStatus(message);
        if (window.AndroidHwpRenderer && AndroidHwpRenderer.onFailed) AndroidHwpRenderer.onFailed(message);
        return;
      }
      startedFromAndroid = true;
      setStatus('HWP 문서 데이터를 불러오는 중…');
      const name = AndroidHwpRenderer.documentName ? AndroidHwpRenderer.documentName() : '문서';
      const base64 = AndroidHwpRenderer.documentBase64();
      await window.renderHwpBase64(base64, name);
    };

    boot();
  </script>
</body>
</html>
